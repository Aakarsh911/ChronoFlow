version: "3.9"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: chronoflow
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck: { test: ["CMD-SHELL","pg_isready -U app"], interval: 5s, timeout: 3s, retries: 10 }

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck: { test: ["CMD","redis-cli","ping"], interval: 5s, timeout: 3s, retries: 10 }

  api:
    build: ../api
    environment:
      PORT: 8080
      DATABASE_URL: postgres://app:app@db:5432/chronoflow?sslmode=disable
      REDIS_URL: redis://redis:6379
    depends_on: [db, redis]
    ports: ["8080:8080"]

  jobs:
    build: ../jobs
    environment:
      PORT: 8080
      DATABASE_URL: postgres://app:app@db:5432/chronoflow?sslmode=disable
      REDIS_URL: redis://redis:6379
    depends_on: [db, redis]

  web:
    build: ../web
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    depends_on: [api]
    ports: ["3000:3000"]

  mcp-gcal:
    build: ../mcp/gcal
    environment: { PORT: 8080 }
    depends_on: [api]

  mcp-slack:
    build: ../mcp/slack
    environment: { PORT: 8080 }

  mcp-jira:
    build: ../mcp/jira
    environment: { PORT: 8080 }

  mcp-graph:
    build: ../mcp/graph
    environment: { PORT: 8080 }

volumes:
  pgdata:
